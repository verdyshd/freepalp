<svg viewBox="0 0 220 44" xmlns="http://www.w3.org/2000/svg" width="440" height="88">
  <defs>
    <linearGradient id="wm-text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8eaf0"/>
      <stop offset="100%" stop-color="#8b9ab8"/>
    </linearGradient>
    <linearGradient id="wm-sub" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#63b3ed"/>
      <stop offset="100%" stop-color="#7c6fcd"/>
    </linearGradient>
    <radialGradient id="wm-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f9ca24" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f9ca24" stop-opacity="0"/>
    </radialGradient>
    <filter id="wm-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#63b3ed" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Tentacle S-path -->
  <path d="M10,38 C4,33 2,26 6,20 C10,14 18,13 19,8 C20,3 16,0 12,1"
        fill="none" stroke="#c0392b" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Highlight -->
  <path d="M10,38 C4,33 2,26 6,20 C10,14 18,13 19,8 C20,3 16,0 12,1"
        fill="none" stroke="#f1948a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Suction cups -->
  <circle cx="8"  cy="34" r="2.2" fill="#922b21"/>
  <circle cx="4"  cy="25" r="2.2" fill="#922b21"/>
  <circle cx="5"  cy="17" r="2"   fill="#922b21"/>
  <circle cx="12" cy="10" r="1.8" fill="#922b21"/>
  <!-- Key glow -->
  <circle cx="24" cy="11" r="9" fill="url(#wm-glow)"/>
  <!-- Key bow -->
  <circle cx="24" cy="10" r="6"   fill="none" stroke="#f9ca24" stroke-width="2.5"/>
  <circle cx="24" cy="10" r="2.5" fill="none" stroke="#f9ca24" stroke-width="1.5" opacity="0.6"/>
  <!-- Key shaft -->
  <rect x="21.5" y="15.5" width="5"  height="14" rx="2.5" fill="#f9ca24"/>
  <!-- Key teeth -->
  <rect x="26.5" y="20"   width="5"  height="3"  rx="1.5" fill="#f9ca24"/>
  <rect x="26.5" y="25"   width="4"  height="3"  rx="1.5" fill="#f9ca24"/>

  <!-- "FreePalp" wordmark -->
  <text x="38" y="28"
        font-family="'Inter','Segoe UI',system-ui,sans-serif"
        font-size="22" font-weight="700" letter-spacing="-0.5"
        fill="url(#wm-text)" filter="url(#wm-shadow)">FreePalp</text>

  <!-- Subtitle bar -->
  <rect x="38" y="33" width="90" height="2" rx="1" fill="url(#wm-sub)" opacity="0.6"/>
  <text x="38" y="43"
        font-family="'Inter','Segoe UI',system-ui,sans-serif"
        font-size="9.5" fill="#5a6580" letter-spacing="0.5">AI Orchestrator · ReAct Loop</text>
</svg>
