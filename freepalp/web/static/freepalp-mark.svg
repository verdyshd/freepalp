<svg xmlns="http://www.w3.org/2000/svg" viewBox="-12 -10 224 224" width="224" height="224">
  <!-- FreePalp знак (марка) — щупальце+ключ, без плитки и без текста. Для сайдбара. -->
  <defs>
    <linearGradient id="mTent" x1="10%" y1="100%" x2="80%" y2="0%">
      <stop offset="0%"   stop-color="#8e1e3a"/>
      <stop offset="50%"  stop-color="#e0354b"/>
      <stop offset="100%" stop-color="#ff7a59"/>
    </linearGradient>
    <linearGradient id="mKey" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffd969"/>
      <stop offset="55%"  stop-color="#f2a93b"/>
      <stop offset="100%" stop-color="#d97e16"/>
    </linearGradient>
    <filter id="mSh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Щупальце: конус с завитком -->
  <path filter="url(#mSh)"
    d="M 26,200 C 18,150 22,100 44,62 C 64,28 106,12 140,26
       C 168,38 182,66 174,92 C 168,113 148,124 131,116
       C 118,110 114,94 124,85 C 131,79 141,82 143,90
       C 145,97 139,102 133,100 C 137,108 149,108 156,99
       C 165,87 161,68 146,58 C 124,44 92,52 76,76
       C 60,99 60,140 72,200 Z"
    fill="url(#mTent)"/>
  <path d="M 30,196 C 24,150 28,102 48,66 C 66,35 104,20 136,32"
        fill="none" stroke="#ffd2c2" stroke-opacity="0.45"
        stroke-width="9" stroke-linecap="round"/>
  <g fill="#ffc4b3">
    <circle cx="80"  cy="180" r="7.5" opacity="0.55"/>
    <circle cx="72"  cy="148" r="7"   opacity="0.6"/>
    <circle cx="72"  cy="116" r="6.5" opacity="0.65"/>
    <circle cx="82"  cy="88"  r="6"   opacity="0.7"/>
    <circle cx="102" cy="68"  r="5.5" opacity="0.7"/>
    <circle cx="126" cy="60"  r="4.5" opacity="0.7"/>
    <circle cx="146" cy="72"  r="3.5" opacity="0.7"/>
  </g>

  <!-- Ключ в завитке-«хвате» -->
  <g filter="url(#mSh)">
    <circle cx="137" cy="99" r="15" fill="none" stroke="url(#mKey)" stroke-width="8.5"/>
    <rect x="132" y="112" width="10" height="48" rx="5" fill="url(#mKey)"/>
    <rect x="139" y="128" width="15" height="7.5" rx="3.7" fill="url(#mKey)"/>
    <rect x="139" y="143" width="11" height="7.5" rx="3.7" fill="url(#mKey)"/>
  </g>
  <path d="M 124,93 A 15,15 0 0 1 149,92" fill="none"
        stroke="#fff" stroke-opacity="0.35" stroke-width="4" stroke-linecap="round"/>
  <rect x="132" y="113" width="4" height="44" rx="2" fill="#fff" opacity="0.18"/>
  <path d="M 124,85 C 131,79 141,82 143,90 C 145,97 139,104 132,101"
        fill="none" stroke="url(#mTent)" stroke-width="13" stroke-linecap="round"/>
  <path d="M 124,85 C 131,79 141,82 143,90"
        fill="none" stroke="#ffd2c2" stroke-opacity="0.4" stroke-width="4" stroke-linecap="round"/>
</svg>
