<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Фон -->
    <radialGradient id="bg" cx="38%" cy="36%" r="72%">
      <stop offset="0%"   stop-color="#1c2235"/>
      <stop offset="100%" stop-color="#090c14"/>
    </radialGradient>

    <!-- Щупальце: тёмно-красный → яркий красный -->
    <linearGradient id="tentBody" x1="20%" y1="100%" x2="80%" y2="0%">
      <stop offset="0%"   stop-color="#7b1a14"/>
      <stop offset="45%"  stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#e84040"/>
    </linearGradient>
    <!-- Хайлайт (блик) -->
    <linearGradient id="tentHi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f5b7b1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f5b7b1" stop-opacity="0"/>
    </linearGradient>

    <!-- Ключ: золото -->
    <linearGradient id="keyGold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#ffe066"/>
      <stop offset="55%"  stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#c88000"/>
    </linearGradient>
    <!-- Блик ключа -->
    <linearGradient id="keyHi" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#fff9c4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </linearGradient>

    <!-- Свечение ключа -->
    <filter id="keyGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Мягкое гало -->
    <filter id="halo" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <!-- Тень щупальца -->
    <filter id="tentShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <clipPath id="roundClip">
      <rect width="200" height="200" rx="42"/>
    </clipPath>
  </defs>

  <!-- ── Фон ── -->
  <rect width="200" height="200" rx="42" fill="url(#bg)"/>

  <!-- ── Щупальце ──────────────────────────────────────────────── -->
  <!--
    Форма: снизу справа (маленький завиток) → вверх-влево (тело) →
    изгибается вправо (верхняя петля) → кончик уходит вправо
    Ключ «сидит» в проёме верхней петли.
  -->

  <!-- Тень -->
  <path
    d="M 118,188
       C 146,184 164,164 160,136
       C 156,108 126,104 106,94
       C 86,84  56,80  44,60
       C 32,40  46,18  72,14
       C 88,10  106,18 116,32"
    fill="none" stroke="#3a0a07" stroke-width="34" stroke-linecap="round"
    filter="url(#tentShadow)" clip-path="url(#roundClip)" opacity="0.6"/>

  <!-- Основное тело щупальца -->
  <path id="tent"
    d="M 118,188
       C 146,184 164,164 160,136
       C 156,108 126,104 106,94
       C 86,84  56,80  44,60
       C 32,40  46,18  72,14
       C 88,10  106,18 116,32"
    fill="none" stroke="url(#tentBody)" stroke-width="30" stroke-linecap="round"
    clip-path="url(#roundClip)"/>

  <!-- Блик (полупрозрачная полоса вдоль выпуклой стороны) -->
  <path
    d="M 118,188
       C 146,184 164,164 160,136
       C 156,108 126,104 106,94
       C 86,84  56,80  44,60
       C 32,40  46,18  72,14
       C 88,10  106,18 116,32"
    fill="none" stroke="url(#tentHi)" stroke-width="11" stroke-linecap="round"
    clip-path="url(#roundClip)"/>

  <!-- ── Присоски (вдоль вогнутой стороны) ── -->
  <!-- каждая: тёмное кольцо + яркая точка -->
  <g clip-path="url(#roundClip)">
    <circle cx="151" cy="158" r="6.5" fill="#6e1810"/><circle cx="151" cy="158" r="3.5" fill="#e84040" opacity="0.45"/>
    <circle cx="147" cy="130" r="6"   fill="#6e1810"/><circle cx="147" cy="130" r="3"   fill="#e84040" opacity="0.45"/>
    <circle cx="126" cy="106" r="5.5" fill="#6e1810"/><circle cx="126" cy="106" r="2.8" fill="#e84040" opacity="0.45"/>
    <circle cx="98"  cy="92"  r="5.5" fill="#6e1810"/><circle cx="98"  cy="92"  r="2.8" fill="#e84040" opacity="0.45"/>
    <circle cx="65"  cy="78"  r="5"   fill="#6e1810"/><circle cx="65"  cy="78"  r="2.5" fill="#e84040" opacity="0.45"/>
    <circle cx="44"  cy="58"  r="4.5" fill="#6e1810"/><circle cx="44"  cy="58"  r="2.2" fill="#e84040" opacity="0.45"/>
    <circle cx="57"  cy="34"  r="4"   fill="#6e1810"/><circle cx="57"  cy="34"  r="2"   fill="#e84040" opacity="0.45"/>
  </g>

  <!-- ── Ключ ──────────────────────────────────────────────────── -->
  <!-- Позиция: верхний правый квадрант, в «объятиях» верхней петли -->

  <!-- Гало-свечение -->
  <circle cx="138" cy="56" r="35" fill="#f0b429" opacity="0.18" filter="url(#halo)"/>

  <!-- Кольцо ключа (outer) -->
  <circle cx="138" cy="54" r="23"
          fill="none" stroke="url(#keyGold)" stroke-width="9"
          filter="url(#keyGlow)"/>
  <!-- Кольцо ключа (inner hollow) -->
  <circle cx="138" cy="54" r="10"
          fill="none" stroke="url(#keyGold)" stroke-width="3" opacity="0.6"/>
  <!-- Центральная точка кольца -->
  <circle cx="138" cy="54" r="4" fill="#ffe066" opacity="0.35"/>

  <!-- Стержень ключа -->
  <rect x="132.5" y="75" width="11" height="50" rx="5.5"
        fill="url(#keyGold)" filter="url(#keyGlow)"/>
  <!-- Блик стержня -->
  <rect x="133.5" y="77" width="4.5" height="46" rx="2.5"
        fill="url(#keyHi)"/>

  <!-- Зубцы ключа (вправо) -->
  <rect x="143.5" y="93"  width="17" height="8.5" rx="4" fill="url(#keyGold)"/>
  <rect x="143.5" y="109" width="13" height="8.5" rx="4" fill="url(#keyGold)"/>

  <!-- Блики зубцов -->
  <rect x="143.5" y="93"  width="17" height="3.5" rx="2" fill="#fff9c4" opacity="0.3"/>
  <rect x="143.5" y="109" width="13" height="3.5" rx="2" fill="#fff9c4" opacity="0.3"/>

  <!-- ── Рамка (слабое свечение по краю) ── -->
  <rect width="200" height="200" rx="42"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
</svg>
