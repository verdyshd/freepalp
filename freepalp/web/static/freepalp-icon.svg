<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!--
    FreePalp icon v3 — Fluent + читаемое щупальце:
    конус (толстое основание → тонкий кончик), завиток на конце,
    упрощённые присоски. Ключ в изгибе. Без обводок и свечений.
  -->
  <defs>
    <linearGradient id="tile" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#394763"/>
      <stop offset="55%"  stop-color="#222c44"/>
      <stop offset="100%" stop-color="#151c2e"/>
    </linearGradient>
    <linearGradient id="tileSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tent3" x1="10%" y1="100%" x2="80%" y2="0%">
      <stop offset="0%"   stop-color="#8e1e3a"/>
      <stop offset="50%"  stop-color="#e0354b"/>
      <stop offset="100%" stop-color="#ff7a59"/>
    </linearGradient>
    <linearGradient id="key3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffd969"/>
      <stop offset="55%"  stop-color="#f2a93b"/>
      <stop offset="100%" stop-color="#d97e16"/>
    </linearGradient>
    <filter id="softSh3" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.32"/>
    </filter>
    <clipPath id="clip3"><rect width="200" height="200" rx="46"/></clipPath>
  </defs>

  <rect width="200" height="200" rx="46" fill="url(#tile)"/>
  <rect width="200" height="200" rx="46" fill="url(#tileSheen)"/>

  <g clip-path="url(#clip3)">
    <!-- ── Щупальце: конус с завитком ──
         основание внизу слева (широкое), подъём, дуга вправо,
         кончик закручивается спиралью внутрь над ключом -->
    <path filter="url(#softSh3)"
      d="M 26,200
         C 18,150 22,100 44,62
         C 64,28 106,12 140,26
         C 168,38 182,66 174,92
         C 168,113 148,124 131,116
         C 118,110 114,94 124,85
         C 131,79 141,82 143,90
         C 145,97 139,102 133,100
         C 137,108 149,108 156,99
         C 165,87 161,68 146,58
         C 124,44 92,52 76,76
         C 60,99 60,140 72,200
         Z"
      fill="url(#tent3)"/>

    <!-- Полупрозрачный fluent-слой вдоль внешнего края -->
    <path d="M 30,196
             C 24,150 28,102 48,66
             C 66,35 104,20 136,32"
          fill="none" stroke="#ffd2c2" stroke-opacity="0.45"
          stroke-width="9" stroke-linecap="round"/>

    <!-- ── Присоски: упрощённые светлые кружки вдоль внутреннего края ── -->
    <g fill="#ffc4b3" opacity="0.85">
      <circle cx="80"  cy="180" r="7.5" opacity="0.55"/>
      <circle cx="72"  cy="148" r="7"   opacity="0.6"/>
      <circle cx="72"  cy="116" r="6.5" opacity="0.65"/>
      <circle cx="82"  cy="88"  r="6"   opacity="0.7"/>
      <circle cx="102" cy="68"  r="5.5" opacity="0.7"/>
      <circle cx="126" cy="60"  r="4.5" opacity="0.7"/>
      <circle cx="146" cy="72"  r="3.5" opacity="0.7"/>
    </g>
  </g>

  <!-- ── Ключ: в открытом изгибе щупальца, справа внизу ── -->
  <g filter="url(#softSh3)">
    <circle cx="142" cy="143" r="19" fill="none" stroke="url(#key3)" stroke-width="10"/>
    <rect x="136.5" y="159" width="11" height="36" rx="5.5" fill="url(#key3)"/>
    <rect x="144"   y="170" width="16" height="8"  rx="4"   fill="url(#key3)"/>
    <rect x="144"   y="183" width="12" height="8"  rx="4"   fill="url(#key3)"/>
  </g>
  <!-- свет сверху на кольце -->
  <path d="M 126,136 A 19,19 0 0 1 157,135" fill="none"
        stroke="#fff" stroke-opacity="0.35" stroke-width="4.5" stroke-linecap="round"/>
  <rect x="136.5" y="160" width="4.5" height="33" rx="2.2" fill="#fff" opacity="0.18"/>
</svg>
