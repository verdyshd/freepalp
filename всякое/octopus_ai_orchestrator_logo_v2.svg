<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
<defs>
    <!-- Подключение шрифта Rajdhani -->    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;700&amp;display=swap');
      text { font-family: 'Rajdhani', 'Segoe UI', sans-serif; }
    </style>    <!-- Градиенты для щупальца -->    <linearGradient id="tentacleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="40%" stop-color="#d62828"/>
      <stop offset="70%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </linearGradient>    <radialGradient id="keyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff8800"/>
    </radialGradient>    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="2" dy="3" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>    <filter id="keyInnerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>    <linearGradient id="specular" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>  <!-- Белый фон -->  <rect width="800" height="400" fill="#ffffff"/>  <!-- ЛЕВАЯ ЧАСТЬ: ЗНАК (щупальце с ключом) -->  <g transform="translate(30, 20) scale(0.65)" filter="url(#softShadow)">
    <!-- Щупальце -->
    <path d="M 280,380 
             C 280,380 270,340 260,310 
             C 240,260 210,220 200,180 
             C 190,140 200,100 220,80 
             C 240,60 260,70 270,90 
             C 280,110 280,140 270,170 
             C 260,200 240,230 250,270 
             C 260,310 280,340 290,380 
             Z" 
          fill="url(#tentacleGrad)"/>    <!-- Внутренняя сторона -->
<path d="M 240,380 
C 240,360 245,330 255,300 
C 265,270 260,240 255,210 
C 250,180 255,150 260,130 
C 265,110 270,100 270,90 
C 265,105 258,130 255,160 
C 252,190 258,220 263,250 
C 268,280 260,310 250,340 
C 240,370 235,380 240,380 Z" 
fill="#f08080" opacity="0.3"/>
    <!-- Присоски -->    <ellipse cx="252" cy="340" rx="8" ry="6" fill="#ffcccb" opacity="0.5"/>
    <ellipse cx="256" cy="310" rx="7" ry="5" fill="#ffcccb" opacity="0.5"/>
    <ellipse cx="260" cy="280" rx="6" ry="5" fill="#ffcccb" opacity="0.5"/>
    <ellipse cx="258" cy="250" rx="6" ry="4" fill="#ffcccb" opacity="0.5"/>
    <ellipse cx="250" cy="220" rx="5" ry="4" fill="#ffcccb" opacity="0.5"/>
    <ellipse cx="242" cy="190" rx="5" ry="4" fill="#ffcccb" opacity="0.5"/>
    <ellipse cx="238" cy="160" rx="4" ry="3" fill="#ffcccb" opacity="0.5"/>
    <ellipse cx="240" cy="130" rx="4" ry="3" fill="#ffcccb" opacity="0.5"/>    <!-- Блик -->
<path d="M 230,350 C 220,310 210,250 215,200 C 218,170 225,140 235,110 
C 240,95 245,85 248,80 
C 244,90 238,105 232,130 
C 226,160 222,190 224,230 
C 226,270 236,320 245,360 Z" 
fill="url(#specular)"/>
    <!-- Ключ -->    <circle cx="260" cy="65" r="14" fill="none" stroke="url(#keyGlow)" stroke-width="5" filter="url(#keyInnerGlow)"/>
    <rect x="258" y="65" width="6" height="20" rx="2" fill="url(#keyGlow)" filter="url(#keyInnerGlow)"/>
    <rect x="258" y="80" width="12" height="3" rx="1" fill="url(#keyGlow)"/>
    <rect x="258" y="86" width="10" height="3" rx="1" fill="url(#keyGlow)"/>
    <rect x="258" y="92" width="8" height="3" rx="1" fill="url(#keyGlow)"/>
    <circle cx="260" cy="65" r="6" fill="#ffffaa" opacity="0.8"/>
    <circle cx="260" cy="65" r="18" fill="#ffd700" opacity="0.15"/>
  </g>  <!-- ПРАВАЯ ЧАСТЬ: ТЕКСТ -->  <g transform="translate(260, 130)">
    <!-- Основное слово OCTOPUS -->
    <text x="0" y="0" font-size="56" font-weight="700" fill="#1a1a1a" letter-spacing="2">OCTOPUS</text>    <!-- Подпись AI ORCHESTRATOR -->    <text x="0" y="45" font-size="24" font-weight="500" letter-spacing="1.5">
      <tspan fill="#0ea5e9">AI</tspan>
      <tspan fill="#6c757d" font-weight="400"> ORCHESTRATOR</tspan>
    </text>    <!-- Декоративная тонкая линия (опционально, для хай-тек) -->    <line x1="0" y1="65" x2="380" y2="65" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="4 4"/>
  </g>
</svg>